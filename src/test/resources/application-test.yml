spring:
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: public
    liquibase-schema: public
    url: jdbc:postgresql://localhost:5432/tvbingo
    username: tvbingo_user
    password: tvbingo_password
  
  test:
    database:
      replace: none
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: tvbingo_schema

management:
  health:
    db:
      enabled: false

zonky:
  test:
    database:
      provider: embedded
      postgres:
        client:
          properties:
            currentSchema: tvbingo_schema

logging:
  level:
    org.springframework.test.context: WARN
    org.springframework.test.context.cache: INFO
    org.springframework.test.context.transaction: WARN
    org.springframework.beans: WARN
    org.springframework.core: WARN
    org.springframework.orm: WARN
    org.hibernate: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE 