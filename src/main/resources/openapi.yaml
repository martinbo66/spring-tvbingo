openapi: 3.0.3
info:
  title: TV Bingo API
  description: REST API for managing TV show bingo games
  version: '1.0.0'

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: shows
    description: TV Show Bingo game management

paths:
  /api/shows:
    get:
      tags:
        - shows
      summary: Get all shows
      description: Retrieves a list of all TV show bingo games
      operationId: getAllShows
      responses:
        '200':
          description: List of shows retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Show'
    post:
      tags:
        - shows
      summary: Create a new show
      description: Creates a new TV show bingo game
      operationId: createShow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShowRequest'
      responses:
        '201':
          description: Show created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Show'
        '400':
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '409':
          description: Show title already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/shows/{id}:
    parameters:
      - name: id
        in: path
        description: ID of the show
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags:
        - shows
      summary: Get a show by ID
      description: Retrieves a specific TV show bingo game by its ID
      operationId: getShow
      responses:
        '200':
          description: Show retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Show'
        '404':
          description: Show not found
    put:
      tags:
        - shows
      summary: Update a show
      description: Updates an existing TV show bingo game
      operationId: updateShow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShowRequest'
      responses:
        '200':
          description: Show updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Show'
        '400':
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Show not found
        '409':
          description: Show title already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      tags:
        - shows
      summary: Delete a show
      description: Deletes a TV show bingo game
      operationId: deleteShow
      responses:
        '204':
          description: Show deleted successfully
        '404':
          description: Show not found

components:
  schemas:
    Show:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          description: Unique identifier for the show
        showTitle:
          type: string
          description: Title of the TV show
        gameTitle:
          type: string
          description: Title of the bingo game
        centerSquare:
          type: string
          description: Text for the center square of the bingo board
        phrases:
          type: array
          items:
            type: string
          description: List of phrases for the bingo squares
      required:
        - showTitle

    ShowRequest:
      type: object
      properties:
        showTitle:
          type: string
          description: Title of the TV show (must be unique)
        gameTitle:
          type: string
          description: Title of the bingo game
        centerSquare:
          type: string
          description: Text for the center square of the bingo board
        phrases:
          type: array
          items:
            type: string
          description: List of phrases for the bingo squares
      required:
        - showTitle

    ValidationError:
      type: object
      additionalProperties:
        type: string
      description: Map of field names to validation error messages 